spring.application.name=catalogo-inventario-service
spring.datasource.url=jdbc:h2:mem:catalogodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false
spring.profiles.active=dev
server.port=8082
spring.hateoas.use-hal-as-default-json-media-type=true
logging.level.com.minimarket.security=INFO
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

jwt.secret=${JWT_SECRET:MiniMarketPlusSecretKey2026SuperSeguraYFuerte}
jwt.expiration=3600000

# Token interno para descuento de stock desde ventas-service
catalogo.internal-token=${CATALOGO_INTERNAL_TOKEN:MiniMarketInternalTokenLocal}
