spring.application.name=minimarket-app
spring.datasource.url=jdbc:h2:mem:minimarketdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false
spring.profiles.active=dev
server.port=8080
spring.hateoas.use-hal-as-default-json-media-type=true
logging.level.com.minimarket.security=INFO
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

#======================================#
# Configuración de JWT (mismo secret que auth-service)
jwt.secret=${JWT_SECRET:MiniMarketPlusSecretKey2026SuperSeguraYFuerte}
jwt.expiration=3600000
#======================================#