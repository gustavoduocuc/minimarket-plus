spring.application.name=ventas-service
spring.datasource.url=jdbc:h2:mem:minimarketdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false
spring.profiles.active=dev
server.port=8080
spring.hateoas.use-hal-as-default-json-media-type=true
logging.level.com.minimarket.security=INFO
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

#======================================#
# Configuración de JWT (mismo secret que auth-service)
jwt.secret=${JWT_SECRET:MiniMarketPlusSecretKey2026SuperSeguraYFuerte}
jwt.expiration=3600000
#======================================#

# Catálogo-inventario (RestClient)
catalogo.base-url=${CATALOGO_BASE_URL:http://localhost:8082}
catalogo.connect-timeout-ms=2000
catalogo.read-timeout-ms=3000

# Token interno para sync de proyecciones de usuario (auth → ventas)
ventas.internal-token=${VENTAS_INTERNAL_TOKEN:MiniMarketInternalTokenLocal}