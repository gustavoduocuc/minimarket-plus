spring.application.name=auth-service
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false
spring.profiles.active=dev
server.port=8081
spring.hateoas.use-hal-as-default-json-media-type=true
logging.level.com.minimarket.security=INFO
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

#======================================#
# Configuración de JWT (mismo secret que ventas-service y catalogo-inventario-service)
jwt.secret=${JWT_SECRET:MiniMarketPlusSecretKey2026SuperSeguraYFuerte}
jwt.expiration=3600000
#======================================#

security.login.max-attempts=5
security.login.lock-duration-minutes=15
security.login.rate-limit.max-requests=20
security.login.rate-limit.window-seconds=60

# Sync best-effort de proyección de usuario hacia ventas-service
ventas.base-url=${VENTAS_BASE_URL:http://localhost:8080}
ventas.internal-token=${VENTAS_INTERNAL_TOKEN:MiniMarketInternalTokenLocal}
ventas.connect-timeout-ms=1000
ventas.read-timeout-ms=1500
